<div class="layout">
    <!-- Mobile backdrop -->
    <div
        class="mobile-sidebar-backdrop"
        [class.mobile-sidebar-backdrop--open]="isMobileSidebarOpen"
        (click)="closeMobileSidebar()"
        aria-hidden="true"
    ></div>

    <app-main-sidebar
        [items]="items"
        [currentUrl]="currentUrl"
        [userInitial]="userInitial"
        [userName]="userName"
        [userRole]="userRole"
        [userEmail]="userEmail"
        [mobileOpen]="isMobileSidebarOpen"
        (signOut)="logout()"
        (closeMobile)="closeMobileSidebar()"
    />

    <main class="main-content">
        <app-main-topbar
            [pageTitle]="pageTitle"
            (signOut)="logout()"
            (toggleSidebar)="toggleMobileSidebar()"
            (notificationUnreadChange)="onNotificationUnreadChange($event)"
        />
        <div class="page-content">
            <router-outlet></router-outlet>
        </div>
        <app-chat-dock />
        <footer class="layout-footer">
            <div class="layout-footer__inner">
                <p class="layout-footer__brand">© {{ currentYear }} BusGo</p>
                <div class="layout-footer__meta">
                    <span>Hỗ trợ bởi đội ngũ BusGo</span>
                    <span class="layout-footer__dot" aria-hidden="true"></span>
                    <a href="mailto:dchinh6803&#64;gmail.com">dchinh6803&#64;gmail.com</a>
                </div>
            </div>
        </footer>
    </main>
</div>
