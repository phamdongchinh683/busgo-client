<div class="modal-overlay" [class.modal-overlay--open]="open" [attr.aria-hidden]="!open" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>Tạo tài khoản Nhà Xe</h3>
    <form class="modal-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="field">
        <span class="label">Họ tên</span>
        <input class="input" formControlName="fullName" placeholder="tối thiểu 7 ký tự" autocomplete="name" />
        <span class="error" *ngIf="fullNameError">{{ fullNameError }}</span>
      </label>
      <label class="field">
        <span class="label">Địa chỉ email</span>
        <input
          class="input"
          formControlName="email"
          type="email"
          autocomplete="email"
          placeholder="vd: ten@congty.com"
        />
        <span class="error" *ngIf="emailError">{{ emailError }}</span>
      </label>
      <label class="field">
        <span class="label">Số điện thoại</span>
        <input class="input" formControlName="phone" placeholder="11 chữ số" autocomplete="tel" />
        <span class="error" *ngIf="phoneError">{{ phoneError }}</span>
      </label>
      <label class="field">
        <span class="label">Mật khẩu</span>
        <div class="password-wrap">
          <input
            class="input password-input"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Abcd12345#"
          />
          <button
            class="btn-password-toggle"
            type="button"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Ẩn' : 'Hiện'"
          >
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a21.82 21.82 0 0 1 5.06-6.94" />
              <path d="M9.9 4.24A10.95 10.95 0 0 1 12 5c7 0 11 7 11 7a21.86 21.86 0 0 1-3.22 4.74" />
              <path d="M1 1l22 22" />
            </svg>
          </button>
        </div>
        <span class="error" *ngIf="passwordError">{{ passwordError }}</span>
      </label>
      <label class="field field--full field--company">
        <span class="label">Công ty</span>
        <input type="hidden" formControlName="companyId" />
        <input
          #companyInput
          class="input"
          [value]="companySearchValue"
          placeholder="Tìm công ty theo tên..."
          autocomplete="off"
          aria-label="Tìm công ty theo tên"
          (focus)="onCompanyFocus()"
          (input)="onCompanyInput(companyInput.value)"
        />
        <div class="dropdown" *ngIf="dropdownOpen" (scroll)="onCompanyScroll($event)">
          <div class="dropdown-loading" *ngIf="companiesLoading">Đang tải công ty...</div>

          @for (c of companies; track c.id) {
            <button class="dropdown-item" type="button" (click)="selectCompany(c)">
              <span class="company-name">{{ c.name }}</span>
              <span class="company-hotline">{{ c.hotline || 'Chưa có hotline' }}</span>
            </button>
          }

          <div class="dropdown-empty" *ngIf="!companiesLoading && companies.length === 0">Không có công ty</div>
          <div class="dropdown-loading" *ngIf="companiesLoadingMore">Đang tải thêm...</div>
        </div>
        <div class="hint" *ngIf="selectedCompany">
          Đã chọn: <strong>{{ selectedCompany.name }}</strong>
          <button class="btn-link" type="button" (click)="selectCompany(null)">xóa chọn</button>
        </div>
        <span class="error" *ngIf="companyError">{{ companyError }}</span>
      </label>
      <div class="modal-actions">
        <button class="btn btn--ghost" type="button" (click)="close()">Hủy</button>
        <button class="btn" type="submit" [disabled]="submitting">{{ submitting ? 'Đang tạo...' : 'Tạo mới' }}</button>
      </div>
    </form>
  </div>
</div>
