<div class="charts-toolbar">
  <div class="charts-toolbar__intro">
    <h2 id="dashboard-trends-heading" class="charts-section__heading">Phân tích xu hướng</h2>
  </div>

  <div class="charts-toolbar__filters charts-toolbar__filters--global">
    <label class="filter">
      <span>Chu kỳ</span>
      <select class="select" [ngModel]="chartType" (ngModelChange)="emitChartType($event)">
        <option [ngValue]="'monthly'">Theo tháng</option>
        <option [ngValue]="'yearly'">Theo năm</option>
      </select>
    </label>
    <label class="filter" *ngIf="chartType === 'monthly'">
      <span>Năm</span>
      <select class="select" [ngModel]="selectedYear" (ngModelChange)="emitYear($event)">
        @for (y of yearOptions; track y) {
          <option [ngValue]="y">{{ y }}</option>
        }
      </select>
    </label>
  </div>
</div>
