<div class="dashboard">
    <app-page-toast-host />

    <div *ngIf="loading" class="dashboard__body dashboard-skeleton" aria-hidden="true">
        <header class="dashboard__hero dashboard-skeleton__hero">
            <div class="dashboard-skeleton__title">
                <span class="api-skeleton-line api-skeleton-line--lg"></span>
                <span class="api-skeleton-line api-skeleton-line--md"></span>
            </div>
            <div class="dashboard-skeleton__meta">
                <span class="api-skeleton-line api-skeleton-line--sm"></span>
                <span class="api-skeleton-line api-skeleton-line--sm"></span>
                <span class="api-skeleton-line api-skeleton-line--sm"></span>
            </div>
        </header>

        <section class="dashboard-skeleton__stats">
            @for (_ of [1, 2, 3, 4]; track $index) {
                <div class="api-skeleton-card dashboard-skeleton__stat-card">
                    <span class="api-skeleton-line api-skeleton-line--sm"></span>
                    <span class="api-skeleton-line api-skeleton-line--lg"></span>
                    <span class="api-skeleton-line api-skeleton-line--md"></span>
                </div>
            }
        </section>

        <section class="dashboard-skeleton__panels">
            <div class="api-skeleton-card dashboard-skeleton__panel">
                <span class="api-skeleton-line api-skeleton-line--sm"></span>
                <span class="api-skeleton-line api-skeleton-line--md"></span>
                <span class="api-skeleton-line api-skeleton-line--lg"></span>
                <span class="api-skeleton-line"></span>
            </div>
            <div class="api-skeleton-card dashboard-skeleton__panel">
                <span class="api-skeleton-line api-skeleton-line--sm"></span>
                <span class="api-skeleton-line api-skeleton-line--md"></span>
                <span class="api-skeleton-line api-skeleton-line--lg"></span>
                <span class="api-skeleton-line"></span>
            </div>
        </section>

        <section class="dashboard-skeleton__charts">
            @for (_ of [1, 2, 3]; track $index) {
                <div class="api-skeleton-card dashboard-skeleton__chart">
                    <span class="api-skeleton-line api-skeleton-line--sm"></span>
                    <span class="api-skeleton-line api-skeleton-line--md"></span>
                    <span class="api-skeleton-line dashboard-skeleton__chart-line"></span>
                    <span class="api-skeleton-line dashboard-skeleton__chart-line"></span>
                    <span class="api-skeleton-line dashboard-skeleton__chart-line"></span>
                </div>
            }
        </section>
    </div>

    <div *ngIf="!loading && overview" class="dashboard__body">
        <header class="dashboard__hero">
            <div class="dashboard__title-block">
                <h1>Xin chào, {{ dashboardGreetingName }}</h1>
                <p>Tổng quan nhanh về nhà xe, người dùng, đặt vé và doanh thu vận hành.</p>
            </div>

            <div class="dashboard__meta-strip" aria-label="Ngữ cảnh thống kê">
                <span>Hệ thống đang hoạt động</span>
                <span>{{ chartType === 'monthly' ? 'Theo tháng' : 'Theo năm' }}</span>
                <span *ngIf="chartType === 'monthly'">{{ selectedYear }}</span>
            </div>
        </header>

        <app-dashboard-stats-grid [overview]="overview"></app-dashboard-stats-grid>

        <section class="charts-section" aria-labelledby="dashboard-trends-heading">
            <app-dashboard-charts-toolbar [chartType]="chartType" [selectedYear]="selectedYear" [yearOptions]="yearOptions" (chartTypeChange)="onChartTypeUpdated($event)" (selectedYearChange)="onSelectedYearUpdated($event)" />

            <div class="charts-stack">
                <app-dashboard-trend-chart-panel chartTitle="Người dùng theo thời gian" [labels]="userChart.labels" [datasets]="userChart.datasets" [loading]="userChartLoading" [chartKind]="userChartKind" [stacked]="userChartKind === 'bar' && userChart.datasets.length > 1"
                    [total]="trendTotal(userChart)" summaryFormat="number">
                    <div class="chart-block__filters">
                        <label class="filter">
              <span>Trạng thái</span>
              <select class="select" [(ngModel)]="userStatusFilter" (ngModelChange)="onUserChartFiltersChange()">
                <option [ngValue]="''">Tất cả</option>
                @for (s of userStatuses; track s) {
                  <option [ngValue]="s">{{ displayStatusLabel(s) }}</option>
                }
              </select>
            </label>
                        <label class="filter">
              <span>Vai trò</span>
              <select class="select" [(ngModel)]="userRoleFilter" (ngModelChange)="onUserChartFiltersChange()">
                <option [ngValue]="''">Tất cả</option>
                @for (r of userRoles; track r) {
                  <option [ngValue]="r">{{ displayRoleLabel(r) }}</option>
                }
              </select>
            </label>
                        <label class="filter">
              <span>Loại biểu đồ</span>
              <select class="select" [(ngModel)]="userChartKind">
                @for (opt of chartKindOptions; track opt.value) {
                  <option [ngValue]="opt.value">{{ opt.label }}</option>
                }
              </select>
            </label>
                    </div>
                </app-dashboard-trend-chart-panel>

                <app-dashboard-trend-chart-panel chartTitle="Lượt đặt vé theo thời gian" [labels]="bookingChart.labels" [datasets]="bookingChart.datasets" [loading]="bookingChartLoading" [chartKind]="bookingChartKind" [stacked]="bookingChartKind === 'bar' && bookingChart.datasets.length > 1"
                    [total]="trendTotal(bookingChart)" summaryFormat="number">
                    <div class="chart-block__filters">
                        <label class="filter">
              <span>Trạng thái đặt vé</span>
              <select class="select" [(ngModel)]="bookingStatusFilter" (ngModelChange)="onBookingChartFiltersChange()">
                <option [ngValue]="''">Tất cả</option>
                @for (s of bookingStatuses; track s) {
                  <option [ngValue]="s">{{ displayStatusLabel(s) }}</option>
                }
              </select>
            </label>
                        <label class="filter">
              <span>Loại biểu đồ</span>
              <select class="select" [(ngModel)]="bookingChartKind">
                @for (opt of chartKindOptions; track opt.value) {
                  <option [ngValue]="opt.value">{{ opt.label }}</option>
                }
              </select>
            </label>
                    </div>
                </app-dashboard-trend-chart-panel>

                <app-dashboard-trend-chart-panel chartTitle="Doanh thu theo thời gian" [labels]="revenueChart.labels" [datasets]="revenueChart.datasets" [loading]="revenueChartLoading" [chartKind]="revenueChartKind" [stacked]="revenueChartKind === 'bar' && revenueChart.datasets.length > 1"
                    [total]="trendTotal(revenueChart)" summaryFormat="currency">
                    <div class="chart-block__filters">
                        <label class="filter">
              <span>Phương thức thanh toán</span>
              <select class="select" [(ngModel)]="revenueMethodFilter" (ngModelChange)="onRevenueChartFiltersChange()">
                <option [ngValue]="''">Tất cả</option>
                @for (m of revenueMethods; track m) {
                  <option [ngValue]="m">{{ displayMethodLabel(m) }}</option>
                }
              </select>
            </label>
                        <label class="filter">
              <span>Trạng thái thanh toán</span>
              <select class="select" [(ngModel)]="revenueStatusFilter" (ngModelChange)="onRevenueChartFiltersChange()">
                <option [ngValue]="''">Tất cả</option>
                @for (s of revenueStatuses; track s) {
                  <option [ngValue]="s">{{ displayStatusLabel(s) }}</option>
                }
              </select>
            </label>
                        <label class="filter">
              <span>Loại biểu đồ</span>
              <select class="select" [(ngModel)]="revenueChartKind">
                @for (opt of chartKindOptions; track opt.value) {
                  <option [ngValue]="opt.value">{{ opt.label }}</option>
                }
              </select>
            </label>
                    </div>
                </app-dashboard-trend-chart-panel>
            </div>
        </section>
    </div>
</div>
