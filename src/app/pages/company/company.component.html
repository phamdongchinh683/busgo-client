<app-page-toast-host />

<div class="page">
  <div class="page-header">
    <div class="header-row page-header__tools-row">
      <app-page-header-intro
        title="Nhà xe"
        subtitle="Xem và cập nhật thông tin doanh nghiệp vận tải trong hệ thống."
      />

      <app-company-toolbar
        [searchName]="searchName"
        [limit]="limit"
        [pageLimits]="pageLimits"
        (searchNameChange)="onSearchInput($event)"
        (limitChange)="onLimitChange($event)"
        (addClick)="openCreateModal()"
      ></app-company-toolbar>
    </div>
  </div>

  <div class="page-body">
    <app-company-list
      [companies]="companies"
      [loading]="loading"
      (editCompany)="onEdit($event)"
      (deleteCompany)="onDelete($event)"
    ></app-company-list>

    <div class="pagination" *ngIf="companies.length > 0">
      <button class="btn-load-more" type="button" [disabled]="loading || nextCursor === null || loadingMore" (click)="loadMore()">
        {{ nextCursor !== null ? 'Tiếp theo' : 'Không còn dữ liệu' }}
      </button>
    </div>

    <div *ngIf="loadingMore" class="load-more-inline">
      <span class="data-loading-line data-loading-line--md" aria-hidden="true"></span>
    </div>
  </div>
</div>

<app-company-form-modal
  [open]="showModal"
  [form]="companyForm"
  [editingCompany]="editingCompany"
  [submitting]="submitting"
  [uploadingLogo]="uploadingLogo"
  [uploadLogoProgress]="uploadLogoProgress"
  (closed)="closeModal()"
  (submitted)="onSubmit()"
  (logoSelected)="onLogoSelected($event)"
  (logoUploadError)="toast.show($event, 'error')"
></app-company-form-modal>

<app-company-delete-modal
  [open]="showDeleteConfirm"
  [company]="deletingCompany"
  [submitting]="submitting"
  (closed)="cancelDelete()"
  (confirm)="onConfirmDelete()"
></app-company-delete-modal>
